<section>

  <header class="header">
    <h4>Alta de paciente</h4>
    <input class="new-todo" placeholder="Nombre paciente" autofocus="" [(ngModel)]="currenPatient.Nombre" (keyup.enter)="addTodo()">
    <input class="new-todo" placeholder="Apellido paciente" autofocus="" [(ngModel)]="currenPatient.Apellido" (keyup.enter)="addTodo()">
  </header>

  <body>
    <div class="container">
      <!--FechaAlta-->
      <div class="form-group row">
        <label for="example-text-input" class="col-2 col-form-label">FechaAlta</label>
        <div class="col-10">
          <input class="form-control" type="date" [(ngModel)]="currenPatient.FechaAlta" id="patient-FechaAlta-input">
        </div>
      </div>

      <div class="form-group row">
        <label for="example-text-input" class="col-2 col-form-label">PatientId</label>
        <div class="col-10">
          <input class="form-control" type="text" [(ngModel)]="currenPatient.PatientId" id="patient-PatientId-input">
        </div>
      </div>
    </div>

  </body>
</section>

<section>
<div>{{currenPatient.FechaAlta}}</div>
<div>{{currenPatient.Nombre}}</div>
  <div>{{currenPatient.Apellido}}</div>
  <br>
<div>{{currenPatient | json}}</div>

</section>

<div class="alert alert-success" role="alert">
  <div class="btn-group" dropdown keyboardNav="true">
    <button id="pepe" dropdownToggle type="button" class="btn btn-primary dropdown-toggle">
    Listado de paises <span class="caret"></span> {{selectedPais}} </button>
    <ul *dropdownMenu class="dropdown-menu" role="<menubar></menubar>" aria-labelledby="pepe">
      <li role="menuitem" *ngFor="let pais of paises">
        <a class="dropdown-item" href="setCountry/{{pais}}"> {{pais}}</a></li>

    </ul>
  </div>
</div>

<select [(ngModel)]="selectedPais" (change)="onPaisSelection($event)">
  <option *ngFor="let c of paises" [ngValue]="c"  >{{c}}</option>
</select>

<label for="selectedPais"> Pais seleccionado</label>
<div>{{selectedPais}}</div>
<button class="btn btn-danger" (mouseout)="seMovio($event)" (click)="createPatient($event)">Crear paciente</button>
<button class="btn btn-default" (click)="reriveAllPatientList($event)">Buscar pacientes -->reriveAllPatientList</button>
<div class="panel panel-default">
  <div class="panel-heading">
    <h3 class="panel-title">Listado de pacientes</h3>
       
  </div>
  <div class="panel-body">
 
    
    <div *ngFor="let patient of patientList">
      {{patient.Nombre}}
      <!-- The next line refers to a missing member of user, should generate compile error -->
      {{patient.apellido}}

      <label [attr.for]="patient.FechaAlta"></label>
    </div>
  </div>
  
  
</div>
