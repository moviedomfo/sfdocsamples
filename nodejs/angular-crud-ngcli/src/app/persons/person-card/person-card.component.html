<section>
    
      <header class="header">
        <h4>Datos de persona</h4>
        

        <div class="form-group row">
            <label for="example-text-input" class="col-2 col-form-label">Nombre </label>
            <div class="col-6">
              <input class="form-control" placeholder="Nombre" autofocus="" type="text" [(ngModel)]="currenPerson.Nombre" #txtBox_Nombre>
            </div>
          </div>

          <div class="form-group row">
            <label for="example-text-input" class="col-2 col-form-label">Apellido </label>
            <div class="col-6">
              <input class="form-control" placeholder="Apellido " autofocus="" type="text" [(ngModel)]="currenPerson.Apellido" #txtBox_Apellido>
            </div>
          </div>
       
          <div class="form-group row">
            <label for="example-text-input" class="col-2 col-form-label">TipoDocumento </label>
            <div class="col-3">
                <select [(ngModel)]="currenPerson.TipoDocumento" >
                    <option *ngFor="let c of tipoDocumentoList" 
                    [attr.selected]="601" 
                     [ngValue]="c.Nombre"
                      >{{c.Nombre}}</option>
                </select>
            </div>
          </div>
       

          <div class="form-group row">
            <label for="example-text-input" class="col-2 col-form-label">TipoDocumento </label>
            <div class="col-5">
                <input class="new-todo"  placeholder="NroDocumento" 
                autofocus="" [(ngModel)]="currenPerson.NroDocumento" #txtBox_NroDocumento
                (keyup.enter)="txtBox_NroDocumento_onKeyEnter(txtBox_NroDocumento.value)"
                (blur)="txtBox_NroDocumento_onKeyEnter(txtBox_NroDocumento.value)">
        
            </div>
          </div>
       

      

      </header>
    
      
        <div class="container">
          <!--FechaAlta-->
          <div class="form-group row">
            <label for="example-text-input" class="col-2 col-form-label">FechaAlta</label>
            <div class="col-10">
              <input class="form-control" type="date" [(ngModel)]="currenPerson.FechaAlta" id="patient-FechaAlta-input">
            </div>
          </div>
    
          <h3>Estado civil</h3>
          <select class="form-control margin-bottom" #cmbEstadoCivil  [(ngModel)]="currenPerson.IdEstadoCivil"    >
                   <option *ngFor="let item of estadoCivilList"  
                   
                   #item.IdParametro
                   [ngValue]="item.IdParametro">{{item.Nombre}}</option>
            </select>
          
        </div>
    
      
    </section>

    <section>


      <div class="alert-danger">

        <div>Current Person </div>
   
          
          <div>{{currenPerson | json}}</div>
      </div>
      <div class="alert-info">
          
                    
                    <div>Selected Estadocivil </div>
                    
                    <div>{{selectedEstadoCivil | json}}</div>
                </div>
    </section>
